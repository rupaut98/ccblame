name: Release

# Publishes to npm with provenance when a GitHub Release is published.
# Cut one with `gh release create vX.Y.Z --generate-notes` (tag must match package.json version).
# This filename is registered as the npm Trusted Publisher — renaming it breaks publishing.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # mint the OIDC token npm verifies — provenance, no long-lived token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build
      - name: Assert tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          [ "v$PKG" = "$TAG" ] || { echo "version mismatch: package.json=$PKG tag=$TAG"; exit 1; }
      - run: npm publish # bun publish lacks OIDC support — publish with npm
